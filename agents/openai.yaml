interface:
  display_name: "Linear Issue Cleanup"
  short_description: "Reconcile Linear against the real codebase, close stale issues, reschedule valid work, then keep executing the remaining issues"
  default_prompt: "Use $linear-issue-cleanup-skill to reconcile the relevant Linear backlog against the current codebase, recent commits, and any real runtime evidence. Close addressed or obsolete work, then rewrite valid issues into a shorter execution shape with explicit work type, current fact pattern, action, and boundaries before scheduling or implementing them. Keep bugs, UX work, analytics investigations, verification tasks, and refactor work clearly separated, and do not treat unresolved investigation signals as confirmed code defects."
