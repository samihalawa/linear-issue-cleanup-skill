interface:
  display_name: "Linear Issue Cleanup"
  short_description: "Reconcile Linear against the real codebase, close stale issues, reschedule valid work, then keep executing the remaining issues"
  default_prompt: "Use $linear-issue-cleanup-skill to reconcile the relevant Linear backlog against the current codebase, recent commits, and any real runtime evidence. Use `samihalawa/2026-MANUS-oulang` for real implementation/debugging work and `Oulang Ideas & Inspirations` for opportunities/ideas. Move misfiled issues to the correct project, close already addressed work as completed, cancel stale or hallucinated items with evidence, then continue systematically through the remaining valid issues while keeping Linear status, project assignment, and comments in sync."
